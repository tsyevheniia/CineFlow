<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="font/bootstrap-icons.css">
</head>
<body style="display:none;">
<nav class='navbar position-fixed w-100 z-1 py-4'>
    <div class="container">
        <a class="navbar-brand logo-link" href="index.html" aria-label="Przejdź do strony głównej">
            <img class="logo-img" src="images/logo-transparent.png" alt="CineFlow logo" style="width: 10rem">
        </a>
        <a class="btn btn-primary px-4 py-2 text-white fw-medium" href="registration.html">
            Zarejestruj się
        </a>
    </div>
</nav>
<header class="header d-flex justify-content-center align-items-center position-absolute z-0  h-100 w-100 py-5">
    <div class="w-75 position-relative z-1 ">
        <form class="h-75 m-auto p-3 text-white needs-validation" id="loginForm" method="post" novalidate>
            <h3>Zaloguj się</h3>
            <div class="my-3">
                <label for="inputEmail" class="form-label">Adres e-mail</label>
                <input
                        type="email"
                        class="form-control"
                        id="inputEmail"
                        aria-describedby="emailHelp"
                        pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"
                        required>
                <div class="invalid-feedback" id="emailError">
                    Proszę wprowadzić poprawny adres e-mail.
                </div>
            </div>
            <div class="mb-3">
                <div class="mb-4">
                    <label for="inputPassword" class="form-label text-white">
                        Hasło
                    </label>

                    <input
                            type="password"
                            class="form-control"
                            id="inputPassword"
                            required
                            minlength="8"
                            pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$"
                    />

                    <div class="invalid-feedback" id="passwordFormatError">
                        Proszę wprowadzić poprawne hasło.
                    </div>

                    <div class="invalid-feedback d-none" id="passwordWrongError">
                        Nieprawidłowe hasło.
                    </div>
                </div>

            </div>
            <div class="mt-2 w-100">
                <button type="submit" class="btn btn-primary w-100" >Zaloguj się</button>
            </div>

        </form>
    </div>
</header>
<script src="js/login.js"></script>
</body>
</html>
