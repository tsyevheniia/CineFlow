<section class="w-100 py-5 movie-section">
    <div class="container">
        <h1 class="">Top 20 najwyżej ocenianych filmów</h1>
    </div>
    <div class="container-fluid mt-5">
        <div class="row justify-content-center">
            <div id="topRated" class="carousel slide m-2">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <div id="activatedTopRatedFilms" class="d-flex justify-content-center flex-wrap"></div>
                    </div>
                    <div class="carousel-item">
                        <div id="topRatedFilms" class="d-flex justify-content-center flex-wrap"></div>
                    </div>
                    <div class="carousel-item">
                        <div id="topRatedFilms3" class="d-flex justify-content-center flex-wrap"></div>
                    </div>
                    <div class="carousel-item">
                        <div id="topRatedFilms4" class="d-flex justify-content-center flex-wrap"></div>
                    </div>
                    <div class="carousel-item">
                        <div id="topRatedFilms5" class="d-flex justify-content-center flex-wrap"></div>
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#topRated" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Poprzedni</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#topRated" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Następny</span>
                </button>
            </div>
        </div>
    </div>
</section>

                    </div>

                        <div id="nowPlayingFilms" class="d-flex justify-content-center flex-wrap">

        <h1 class="">Popularne filmy</h1>
    </div>

    <div class="container-fluid mt-5">
        <div class="row justify-content-center">
            <div id="popular" class="carousel slide m-2">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <div id="activatedPopularFilms" class="d-flex justify-content-center flex-wrap">
                        </div>
                    </div>
                    <div class="carousel-item">
                        <div id="popularFilms" class="d-flex justify-content-center flex-wrap">

<div class="modal" id="staticBackdrop">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="staticBackdropLabel">Informacje o użytkowniku</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Zamknij"></button>
            </div>
            <div class="modal-body">
                <div id="modalUserText">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="logOutBtn">Wyloguj się</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zamknij</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="movieInfoModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header border-0">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="container-fluid">
                    <div class="row align-items-center g-4">
                        <div class="col-md-4 col-12 text-center">
                            <img id="modalPoster"
                                 class="img-fluid rounded shadow"
                                 alt="">
                        </div>

                        <div class="col-md-8 col-12">

                            <p id="modalDescription" class="text-light"></p>

                            <p class="text-light mb-1">
                                <span class="text-primary fw-bold">Data premiery:</span>
                                <span id="modalRelease"></span>
                            </p>

                            <p class="text-light mb-3">
                                <span class="text-primary fw-bold">Ocena:</span>
                                <span id="modalRating"></span>
                            </p>

                            <a
                                    href="movie.html"
                                    class="btn btn-primary w-100"
                                    id="modalWatchBtn"
                                    data-bs-dismiss="modal">
                                Obejrzyj zwiastun
                            </a>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/films.js"></script>
