<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="/font/bootstrap-icons.css">
</head>
<body style="display:none;">
<nav class="navbar navbar-expand-lg w-100 bg-primary">
    <div class="container">
        <div>
            <button
                    type="button"
                    class="btn btn-primary"
                    id="modalBtn">
                <i class="bi bi-person-circle fs-1 text-white"></i>
            </button>
        </div>

        <button class="navbar-toggler text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Przełącz nawigację">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" aria-current="page" href="films.html">Filmy</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="shows.html">Seriale</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="production.html">Oryginały</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="min-vh-100 w-100 py-5">
    <div class="container mt-5">
        <h1 class="text-primary fw-bold mb-4">
            Wyszukaj filmy do obejrzenia
        </h1>

        <div class="input-group mt-5">
            <input
                    type="text"
                    class="form-control bg-white text-black w-75"
                    placeholder="Wyszukaj film"
                    aria-label="Wpisz tytuł:"
                    id="inputSearch" >
            <button
                    class="btn btn-lg border-1 border-light"
                    type="button"
                    id="btnSearch"
                    onclick="renderMovieContainer()">
                Szukaj
            </button>
        </div>

        <div id="searchError" class="text-danger fw-semibold mt-2" style="display:none;">
            Nieprawidłowy tytuł filmu. Spróbuj ponownie!
        </div>

        <div id="movieContainer" class="mt-5">
        </div>
    </div>
</section>

<div class="modal" id="staticBackdrop">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="staticBackdropLabel">
                    Informacje o użytkowniku
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Zamknij"></button>
            </div>
            <div class="modal-body">
                <div id="modalUserText">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="logOutBtn">
                    Wyloguj się
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Zamknij
                </button>
            </div>
        </div>
    </div>
</div>

<div class="bg1 py-1"></div>

<script src="js/main.js"></script>
<script src="js/modal.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
